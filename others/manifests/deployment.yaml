apiVersion: apps/v1
kind: Deployment
metadata:
  name: inga-php-application
  labels:
    app: inga-php-application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inga-php-application
  template:
    metadata:
      labels:
        app: inga-php-application
    spec:
      containers:
        - name: app
          image: registry.vivaweb.dev.br/library/inga-php-application:54ae3fe
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /up
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /up
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: APP_KEY
              value: "base64:7IOYsI9QqtJZZljGLxjXOu08MO+mrl5JGySrl8n0ORY="
            - name: LOG_CHANNEL
              value: "stderr"
            - name: SESSION_DRIVER
              value: "array"
            - name: QUEUE_CONNECTION
              value: "sync"
            - name: CACHE_DRIVER
              value: "array"
